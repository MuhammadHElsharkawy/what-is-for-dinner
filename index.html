<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="./Images/favicon.png">
    <link rel="stylesheet" href="./src/output.css">
    <link rel="stylesheet" href="./src/all.min.css">
    <title>What's For Dinner</title>
</head>

<body class="bg-linear-to-br from-orange-50 via-amber-50 to-yellow-50">
    <header class="bg-white shadow-sm border-b border-orange-100">
        <div class="max-w-7xl mx-auto px-6 py-4">
            <div class="flex items-center justify-between">
                <div class="flex items-center gap-3">
                    <div
                        class="w-12 h-12 rounded-full bg-linear-to-br from-orange-500 to-red-500 flex items-center justify-center shadow-lg text-white ">
                        <i class="fa-solid fa-utensils text-lg"></i>
                    </div>
                    <div class="">
                        <h1 class="text-lg md:text-2xl font-bold text-gray-900">What's For Dinner</h1>
                        <p class="text-xs md:text-sm text-gray-500">Your daily meal inspiration</p>
                    </div>
                </div>
                <div class="hidden md:flex items-center gap-6">
                    <button class="text-gray-600 hover:text-orange-600 transition cursor-pointer">
                        <i class="fa-solid fa-bookmark text-base md:text-xl"></i>
                    </button>
                    <button class="text-gray-600 hover:text-orange-600 transition cursor-pointer">
                        <i class="fa-solid fa-clock-rotate-left text-base md:text-xl"></i>
                    </button>
                    <button class="text-gray-600 hover:text-orange-600 transition cursor-pointer">
                        <i class="fa-solid fa-gear text-base md:text-xl"></i>
                    </button>
                    <button class="w-10 h-10 rounded-full border-2 border-orange-300 cursor-pointer overflow-hidden">
                        <img class="w-full" src="./Images/avatar-4.jpg" alt="">
                    </button>
                </div>
                <button id="mobile-menu-btn" onclick="onMenuBtnClick()"
                    class="md:hidden text-gray-600 hover:text-orange-600 transition cursor-pointer">
                    <i class="fa-solid fa-bars text-2xl"></i>
                </button>
            </div>
            <div id="mobile-menu" class="md:hidden hidden mt-4 pb-4 border-t border-orange-100 pt-4">
                <div class="flex flex-col gap-4">
                    <button
                        class="flex items-center gap-3 text-gray-600 hover:text-orange-600 transition cursor-pointer">
                        <i class="text-xl fa-solid fa-bookmark"></i>
                        <span>Saved Recipes</span>
                    </button>
                    <button
                        class="flex items-center gap-3 text-gray-600 hover:text-orange-600 transition cursor-pointer">
                        <i class="text-xl fa-solid fa-clock-rotate-left"></i>
                        <span>Recent</span>
                    </button>
                    <button
                        class="flex items-center gap-3 text-gray-600 hover:text-orange-600 transition cursor-pointer">
                        <i class="text-xl fa-solid fa-gear"></i>
                        <span>Settings</span>
                    </button>
                    <button
                        class="flex items-center gap-3 text-gray-600 hover:text-orange-600 transition cursor-pointer">
                        <img class="w-10 h-10 rounded-full border-2 border-orange-300 cursor-pointer overflow-hidden"
                            src="./Images/avatar-4.jpg" alt="">
                        <span>Profile</span>
                    </button>
                </div>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-3 py-4 sm:px-6 sm:py-8">
        <section class="bg-white rounded-3xl shadow-xl overflow-hidden border border-orange-100 w-full mb-8">
            <div class="grid lg:grid-cols-5 lg:h-187.5">
                <div class="lg:col-span-2 h-100 lg:h-full overflow-hidden relative">
                    <img id="recipe-image" class="w-full h-full object-cover" src="./Images/dinner-10.jpeg" alt="">
                    <div class="absolute top-6 left-6 rounded-full px-4 py-2 bg-white shadow-lg">
                        <div class="flex items-center gap-2">
                            <i class="fa-solid fa-star text-yellow-400 text-sm md:text-base"></i>
                            <span id="recipe-rate" class="font-semibold text-gray-900 text-sm md:text-base"></span>
                            <span id="recipe-reviews" class="text-gray-500 text-xs md:text-sm"></span>
                        </div>
                    </div>
                    <div
                        class="absolute bottom-6 left-6 right-6 bg-white/95 backdrop-blur-sm rounded-2xl p-3 md:p-6 shadow-lg">
                        <div class="grid grid-cols-3 gap-4 text-center">
                            <div>
                                <i class="fa-solid fa-clock text-orange-500 text-lg md:text-2xl mb-2"></i>
                                <p class="text-xs md:text-sm text-gray-500">Prep Time</p>
                                <p id="prep-time" class="font-bold text-gray-900 text-sm md:text-base"></p>
                            </div>
                            <div>
                                <i class="fa-solid fa-fire-burner text-red-500 text-lg md:text-2xl mb-2"></i>
                                <p class="text-xs md:text-sm text-gray-500">Cook Time</p>
                                <p id="cook-time" class="font-bold text-gray-900 text-sm md:text-base"></p>
                            </div>
                            <div>
                                <i class="fa-solid fa-users text-blue-500 text-lg md:text-2xl mb-2"></i>
                                <p class="text-xs md:text-sm text-gray-500">Servings</p>
                                <p id="servings" class="font-bold text-gray-900 text-sm md:text-base"></p>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="lg:col-span-3 p-5 lg:p-10 h-full overflow-y-auto scrollbar-thumb-red-100 scrollbar-thin">
                    <div class="flex flex-col md:flex-row gap-5 items-start justify-between mb-6">
                        <div>
                            <div class="flex items-center gap-3 mb-3">
                                <span id="difficulty"
                                    class="bg-green-100 text-green-700 px-3 py-1 rounded-full text-xs font-semibold"></span>
                                <span id="country"
                                    class="bg-blue-100 text-blue-700 px-3 py-1 rounded-full text-xs font-semibold"></span>
                            </div>
                            <h3 id="recipe-name" class="text-2xl md:text-4xl font-bold text-gray-900 mb-2"></h3>
                            <p id="recipe-description" class="text-sm md:text-lg text-gray-600"></p>
                        </div>
                        <div class="flex gap-2 self-center">
                            <button
                                class="sm:w-12 sm:h-12 w-10 h-10 bg-orange-100 hover:bg-orange-200 text-orange-600 rounded-xl flex items-center justify-center transition cursor-pointer">
                                <i class="text-sm fa-solid fa-bookmark"></i>
                            </button>
                            <button
                                class="sm:w-12 sm:h-12 w-10 h-10 bg-orange-100 hover:bg-orange-200 text-orange-600 rounded-xl flex items-center justify-center transition cursor-pointer">
                                <i class="text-sm fa-solid fa-share-nodes"></i>
                            </button>
                        </div>
                    </div>
                    <div id="time-warning" class="bg-red-50 border-l-4 border-red-500 p-4 rounded-lg mb-6">
                        <div class="flex items-center gap-3">
                            <div class="text-red-500 text-xl">
                                <i class="fa-solid fa-triangle-exclamation"></i>
                            </div>
                            <div>
                                <p class="font-semibold text-red-800 text-sm md:text-base">
                                    Extended Preparation Time
                                </p>
                                <p class="text-xs md:text-sm text-red-600">
                                    This recipe requires more than 45 minutes to prepare. Plan accordingly!
                                </p>
                            </div>
                        </div>
                    </div>
                    <div class="border-b border-gray-200 mb-6 p-4">
                        <div class="grid sm:grid-cols-4 grid-cols-5 gap-2">
                            <button
                                class="tab-button pb-2 font-semibold border-b-2 cursor-pointer text-sm md:text-base flex gap-1 md:gap-2 items-center justify-center text-orange-600 border-orange-600 sm:col-span-1 col-span-2"
                                data-tab="ingredients-tab">
                                <i class="fa-solid fa-list-check shrink-0"></i>
                                <span data-tab="ingredients-tab" id="tab-text-ingredients"
                                    class="truncate tab-text">Ingredients</span>
                            </button>
                            <button
                                class="tab-button pb-2 font-semibold hover:text-gray-700 border-b-2 cursor-pointer text-sm md:text-base flex gap-1 md:gap-2 items-center justify-center whitespace-nowrap text-gray-500 border-transparent"
                                data-tab="instructions-tab">
                                <i class="fa-solid fa-book-open"></i>
                                <span data-tab="instructions-tab" id="tab-text-instructions"
                                    class="truncate hidden sm:inline tab-text">Instructions</span>
                            </button>
                            <button
                                class="tab-button pb-2 font-semibold hover:text-gray-700 border-b-2 cursor-pointer text-sm md:text-base flex gap-1 md:gap-2 items-center justify-center whitespace-nowrap text-gray-500 border-transparent"
                                data-tab="nutrition-tab">
                                <i class="fa-solid fa-chart-pie"></i>
                                <span data-tab="nutrition-tab" id="tab-text-nutrition"
                                    class="truncate hidden sm:inline tab-text">Nutrition</span>
                            </button>
                            <button
                                class="tab-button pb-2 font-semibold hover:text-gray-700 border-b-2 cursor-pointer text-sm md:text-base flex gap-1 md:gap-2 items-center justify-center whitespace-nowrap text-gray-500 border-transparent"
                                data-tab="tips-tab">
                                <i class="fa-solid fa-lightbulb"></i>
                                <span data-tab="tips-tab" id="tab-text-tips"
                                    class="truncate hidden sm:inline tab-text">Chef's Tips</span>
                            </button>
                        </div>
                    </div>
                    <div id="ingredients-tab" class="tab-content h-87.5 overflow-y-auto scrollbar-thin">
                        <div class="bg-linear-to-br from-orange-50 to-amber-50 rounded-2xl p-6">
                            <div class="space-y-3" id="ingredients-list"></div>
                        </div>
                    </div>
                    <div id="instructions-tab" class="tab-content h-87.5 overflow-y-auto scrollbar-thin hidden">
                        <div class="space-y-6" id="instructions-list"></div>
                    </div>
                    <div id="nutrition-tab" class="tab-content h-87.5 overflow-y-auto scrollbar-thin hidden">
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                            <div class="flex items-center justify-between p-4 bg-gray-50 rounded-xl">
                                <div class="flex items-center">
                                    <div
                                        class="w-10 h-10 bg-orange-100 rounded-lg flex items-center justify-center mr-3">
                                        <i class="fa-solid fa-fire text-orange-600"></i>
                                    </div>
                                    <span class="text-gray-700 font-medium text-xs md:text-base">Calories</span>
                                </div>
                                <span class="text-base md:text-xl font-bold text-gray-900" id="calories-value"></span>
                            </div>
                            <div class="flex items-center justify-between p-4 bg-gray-50 rounded-xl">
                                <div class="flex items-center">
                                    <div class="w-10 h-10 bg-blue-100 rounded-lg flex items-center justify-center mr-3">
                                        <i class="fa-solid fa-dumbbell text-blue-600"></i>
                                    </div>
                                    <span class="text-gray-700 font-medium text-xs md:text-base">Protein</span>
                                </div>
                                <span class="text-base md:text-xl font-bold text-gray-900" id="protein-value"></span>
                            </div>
                            <div class="flex items-center justify-between p-4 bg-gray-50 rounded-xl">
                                <div class="flex items-center">
                                    <div
                                        class="w-10 h-10 bg-yellow-100 rounded-lg flex items-center justify-center mr-3">
                                        <i class="text-yellow-600 fa-solid fa-wheat-awn"></i>
                                    </div>
                                    <span class="text-gray-700 font-medium text-xs md:text-base">Carbohydrates</span>
                                </div>
                                <span class="text-base md:text-xl font-bold text-gray-900" id="carbs-value"></span>
                            </div>
                            <div class="flex items-center justify-between p-4 bg-gray-50 rounded-xl">
                                <div class="flex items-center">
                                    <div class="w-10 h-10 bg-red-100 rounded-lg flex items-center justify-center mr-3">
                                        <i class="text-red-600 fa-solid fa-droplet"></i>
                                    </div>
                                    <span class="text-gray-700 font-medium text-xs md:text-base">Fat</span>
                                </div>
                                <span class="text-base md:text-xl font-bold text-gray-900" id="fat-value"></span>
                            </div>
                            <div class="flex items-center justify-between p-4 bg-gray-50 rounded-xl">
                                <div class="flex items-center">
                                    <div
                                        class="w-10 h-10 bg-green-100 rounded-lg flex items-center justify-center mr-3">
                                        <i class="text-green-600 fa-solid fa-seedling"></i>
                                    </div>
                                    <span class="text-gray-700 font-medium text-xs md:text-base">Fiber</span>
                                </div>
                                <span class="text-base md:text-xl font-bold text-gray-900" id="fiber-value"></span>
                            </div>
                            <div class="flex items-center justify-between p-4 bg-gray-50 rounded-xl">
                                <div class="flex items-center">
                                    <div class="w-10 h-10 bg-pink-100 rounded-lg flex items-center justify-center mr-3">
                                        <i class="text-pink-600 fa-solid fa-cube"></i>
                                    </div>
                                    <span class="text-gray-700 font-medium text-xs md:text-base">Sodium</span>
                                </div>
                                <span class="text-base md:text-xl font-bold text-gray-900" id="sodium-value"></span>
                            </div>
                        </div>
                    </div>
                    <div id="tips-tab" class="tab-content h-87.5 overflow-y-auto scrollbar-thin hidden">
                        <div class="space-y-4" id="tips-list"></div>
                    </div>
                    <div class="flex items-center space-x-4 mt-8 pt-6 border-t border-gray-200">
                        <button id="try-another-btn"
                            class="bg-linear-to-r from-orange-500 to-red-500 hover:from-orange-600 hover:to-red-600 text-white px-4 md:px-6 py-2 md:py-3 rounded-full font-semibold shadow-lg hover:shadow-xl transition transform hover:scale-105 cursor-pointer text-sm md:text-base flex items-center gap-1 md:gap-2">
                            <i class="fa-solid fa-rotate"></i>
                            Try Another Recipe
                        </button>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <script src="./JS/main.js"></script>
</body>

</html>
